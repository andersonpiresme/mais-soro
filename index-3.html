// ═══════════════════════════════════════════════════════════════
//   ADAPTADOR DE DADOS — converte JSON v3 (CNES) para o formato
//   esperado pelo componente. Mantém o resto do código intacto.
// ═══════════════════════════════════════════════════════════════
function adaptHospital(u, override) {
  // Se há override (correção manual de coords), usa as coords corrigidas
  const lat = override?.lat ?? u.lat;
  const lng = override?.lng ?? u.lng;
  const overrideQuality = override?.override_quality;

  // Antivenenos vêm como string "Botrópico; Crotálico; ..." — separar em array
  const atendimentos = (u.antivenoms || '')
    .split(';')
    .map(s => s.trim())
    .filter(Boolean);

  // Telefone vem como string com possíveis separadores; pega o primeiro válido
  const telefoneRaw = (u.phones || '').split(/[\/;,]/)[0].trim();

  return {
    // Campos compatíveis com código existente
    estado: u.uf,
    municipio: u.municipio,
    unidade: u.unidade,
    endereco: u.address || '',
    telefone: telefoneRaw,
    cnes: u.cnes,
    atendimentos,
    lat,
    lng,

    // Campos novos do v3 (Tier 1 + Tier 2)
    ativo: u.ativo !== false,  // default true se não vier o campo
    turno_atendimento: u.turno_atendimento,
    turno_atendimento_completo: u.turno_atendimento_completo,
    motivo_desabilitacao: u.motivo_desabilitacao,
    tem_internacao: u.tem_internacao,
    tem_centro_cirurgico: u.tem_centro_cirurgico,
    tipo_unidade: u.tipo_unidade,
    esfera: u.esfera,
    cep: u.cep,
    data_cnes: u.data_cnes,
    email: u.email,

    // Metadados de qualidade
    geocoding_quality: overrideQuality || u.geocoding_quality,
    geocoding_validation: u.geocoding_validation,
  };
}

// ═══════════════════════════════════════════════════════════════
//   HOOK useHospitalsData — carrega hospitais.json + overrides.json
//   Retorna { hospitals, loading, error }
// ═══════════════════════════════════════════════════════════════
function useHospitalsData() {
  const [state, setState] = React.useState({
    hospitals: [],
    loading: true,
    error: null,
  });

  React.useEffect(() => {
    let cancelled = false;

    async function load() {
      try {
        console.log('[Mais Soro] Iniciando carga de dados…');

        const [hospResp, ovrResp] = await Promise.all([
          fetch('./data/hospitais.json'),
          fetch('./data/overrides.json').catch((e) => {
            console.warn('[Mais Soro] overrides.json indisponível:', e.message);
            return { ok: false };
          })
        ]);

        console.log(
          '[Mais Soro] Fetch hospitais.json — ok=' + hospResp.ok +
          ', status=' + hospResp.status
        );

        if (!hospResp.ok) {
          throw new Error('Falha ao carregar hospitais.json: HTTP ' + hospResp.status);
        }

        const hospData = await hospResp.json();
        console.log('[Mais Soro] hospitais.json parseado:', (hospData.unidades || []).length, 'unidades');

        let overrides = {};
        if (ovrResp.ok) {
          try {
            const ovrData = await ovrResp.json();
            overrides = ovrData.overrides || {};
            console.log('[Mais Soro] overrides.json parseado:', Object.keys(overrides).length, 'overrides');
          } catch (ovrErr) {
            console.warn('[Mais Soro] overrides.json com formato inválido, ignorando:', ovrErr.message);
          }
        }

        const hospitals = (hospData.unidades || [])
          .map(u => adaptHospital(u, overrides[u.cnes]))
          .filter(h => h.lat && h.lng);  // remove os que ficaram sem coord

        console.log('[Mais Soro] Hospitais válidos após adapter:', hospitals.length);

        if (!cancelled) {
          setState({ hospitals, loading: false, error: null });
        }
      } catch (err) {
        console.error('[Mais Soro] ERRO no carregamento de dados:', err);
        if (!cancelled) {
          setState({ hospitals: [], loading: false, error: err.message });
        }
      }
    }

    load();
    return () => { cancelled = true; };
  }, []);

  return state;
}

// ═══════════════════════════════════════════════════════════════
//   HOOK useOfflineStatus — monitora SW e detecta dados em cache
// ═══════════════════════════════════════════════════════════════
function useOfflineStatus() {
  const [status, setStatus] = React.useState({
    swReady: false,
    dataCached: false,
    online: navigator.onLine
  });

  React.useEffect(() => {
    const onMsg = (event) => {
      if (event.data?.type === 'DATA_CACHED' || event.data?.type === 'DATA_UPDATED') {
        setStatus(s => ({ ...s, dataCached: true }));
      }
    };

    const onOnline = () => setStatus(s => ({ ...s, online: true }));
    const onOffline = () => setStatus(s => ({ ...s, online: false }));

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.addEventListener('message', onMsg);
      navigator.serviceWorker.ready.then((reg) => {
        setStatus(s => ({ ...s, swReady: true }));
        // Pergunta se os dados estão em cache
        if (reg.active) {
          reg.active.postMessage({ type: 'CHECK_DATA_CACHED' });
        }
      });
    }

    window.addEventListener('online', onOnline);
    window.addEventListener('offline', onOffline);

    // Listener específico para resposta do CHECK_DATA_CACHED
    const onCacheCheck = (event) => {
      if (event.data?.type === 'DATA_CACHED_STATUS') {
        setStatus(s => ({ ...s, dataCached: event.data.cached }));
      }
    };
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.addEventListener('message', onCacheCheck);
    }

    return () => {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.removeEventListener('message', onMsg);
        navigator.serviceWorker.removeEventListener('message', onCacheCheck);
      }
      window.removeEventListener('online', onOnline);
      window.removeEventListener('offline', onOffline);
    };
  }, []);

  return status;
}

// ═══════════════════════════════════════════════════════════════
//   HOOK usePWAInstall — captura beforeinstallprompt
// ═══════════════════════════════════════════════════════════════
function usePWAInstall() {
  const [deferredPrompt, setDeferredPrompt] = React.useState(null);
  const [installed, setInstalled] = React.useState(
    window.matchMedia('(display-mode: standalone)').matches
  );

  React.useEffect(() => {
    const onPrompt = (e) => {
      e.preventDefault();
      setDeferredPrompt(e);
    };
    const onInstalled = () => {
      setInstalled(true);
      setDeferredPrompt(null);
    };

    window.addEventListener('beforeinstallprompt', onPrompt);
    window.addEventListener('appinstalled', onInstalled);

    return () => {
      window.removeEventListener('beforeinstallprompt', onPrompt);
      window.removeEventListener('appinstalled', onInstalled);
    };
  }, []);

  const install = React.useCallback(async () => {
    if (!deferredPrompt) return false;
    deferredPrompt.prompt();
    const choice = await deferredPrompt.userChoice;
    setDeferredPrompt(null);
    return choice.outcome === 'accepted';
  }, [deferredPrompt]);

  return {
    canInstall: !!deferredPrompt,
    installed,
    install
  };
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function SocorroPeconhentos() {
  // ─── Carga de dados externos ───
  const { hospitals: HOSPITALS, loading: hospitalsLoading, error: hospitalsError } = useHospitalsData();
  const offlineStatus = useOfflineStatus();
  const pwaInstall = usePWAInstall();

  const [step, setStep] = React.useState(0);
  const [animalType, setAnimalType] = React.useState(null);
  const [specificType, setSpecificType] = React.useState(null);
  const [userLocation, setUserLocation] = React.useState(null);
  const [locationError, setLocationError] = React.useState(false);
  const [results, setResults] = React.useState([]);
  const [loadingGPS, setLoadingGPS] = React.useState(false);
  const [gpsStatus, setGpsStatus] = React.useState("loading"); // loading | ok | fallback
  const [expanded, setExpanded] = React.useState(null);
  const [navAlert, setNavAlert] = React.useState(null);
  const [triage, setTriage] = React.useState({ idade: null, tempo: null });
  const [showUrgency, setShowUrgency] = React.useState(true);
  const [elapsedSeconds, setElapsedSeconds] = React.useState(0);
  const [accidentStartTime, setAccidentStartTime] = React.useState(null);
  const [fichaModal, setFichaModal] = React.useState(null); // hospital para ficha
  const [localPicada, setLocalPicada] = React.useState("");
  const topRef = React.useRef(null);

  // ── AUTO-GPS no carregamento ──
  React.useEffect(() => {
    const useFallback = (reason) => {
      console.warn("GPS fallback:", reason);
      setUserLocation({ lat: -15.7801, lng: -47.9292 });
      setGpsStatus("fallback");
      setLocationError(true);
    };

    // Verifica se estamos em contexto seguro (HTTPS ou localhost)
    const isSecure = window.isSecureContext || window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1";
    if (!isSecure) {
      useFallback("Contexto não seguro, GPS requer HTTPS");
      return;
    }

    if (!navigator.geolocation) {
      useFallback("Geolocation API indisponível");
      return;
    }

    // Tenta obter localização com alta precisão primeiro, depois baixa precisão
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        setUserLocation({ lat: pos.coords.latitude, lng: pos.coords.longitude });
        setGpsStatus("ok");
      },
      (err) => {
        // Tenta novamente com baixa precisão (usa torre celular/wifi ao invés de GPS)
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            setUserLocation({ lat: pos.coords.latitude, lng: pos.coords.longitude });
            setGpsStatus("ok");
          },
          (err2) => useFallback(`Erro código ${err2.code}: ${err2.message}`),
          { enableHighAccuracy: false, timeout: 15000, maximumAge: 300000 }
        );
      },
      { enableHighAccuracy: true, timeout: 8000, maximumAge: 60000 }
    );
  }, []);

  // ── CRONÔMETRO: calcular tempo estimado do acidente baseado na triagem ──
  React.useEffect(() => {
    if (!triage.tempo) { setAccidentStartTime(null); return; }
    const offsetMinutes = {
      "menos1h": 30,
      "1a3h": 120,
      "3a6h": 270,
      "mais6h": 420
    }[triage.tempo] || 0;
    const startTime = Date.now() - (offsetMinutes * 60 * 1000);
    setAccidentStartTime(startTime);
  }, [triage.tempo]);

  // ── CRONÔMETRO: atualizar a cada segundo ──
  React.useEffect(() => {
    if (!accidentStartTime) return;
    const updateElapsed = () => {
      const elapsed = Math.floor((Date.now() - accidentStartTime) / 1000);
      setElapsedSeconds(elapsed);
    };
    updateElapsed();
    const interval = setInterval(updateElapsed, 1000);
    return () => clearInterval(interval);
  }, [accidentStartTime]);

  // Formatar tempo decorrido
  const formatElapsed = (seconds) => {
    const h = Math.floor(seconds / 3600);
    const m = Math.floor((seconds % 3600) / 60);
    const s = seconds % 60;
    if (h > 0) return `${h}h ${String(m).padStart(2, '0')}min`;
    return `${m}:${String(s).padStart(2, '0')}`;
  };

  // Janela terapêutica em minutos por tipo
  const getWindowMinutes = (type) => ({
    "Botrópico": 360, "Crotálico": 360, "Elapídico": 180,
    "Escorpiônico": 180, "Fonêutrico": 360, "Loxoscélico": 2160,
    "Lonômico": 720, "Aracnídico": 360
  }[type] || 360);

  // Status do cronômetro (cor baseada em proximidade da janela terapêutica)
  const getTimerStatus = () => {
    if (!specificType || specificType === "__COMPLETO__") return "safe";
    const windowMin = getWindowMinutes(specificType);
    const elapsedMin = elapsedSeconds / 60;
    const pct = elapsedMin / windowMin;
    if (pct < 0.5) return "safe";
    if (pct < 0.8) return "warning";
    return "danger";
  };

  const timerStatus = getTimerStatus();
  const timerColors = {
    safe: { bg: "#FFFFFF", border: "#168821", text: "#168821", label: "#168821" },
    warning: { bg: "#FFFBEA", border: "#FFCD07", text: "#B58A00", label: "#8A6500" },
    danger: { bg: "#FFF1F1", border: "#D04F4F", text: "#D04F4F", label: "#A03333" }
  };

  // Gerar ficha de transferência
  const generateFicha = (h) => {
    const idadeLabel = { crianca: "Criança (< 12 anos)", adulto: "Adulto (12-60 anos)", idoso: "Idoso (> 60 anos)" }[triage.idade] || "Não informado";
    const hora = accidentStartTime ? new Date(accidentStartTime).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }) : "Não informado";
    const tipoLabel = specificType === "__COMPLETO__" ? "Não identificado" : specificType;
    const animalLabel = selectedAnimalData?.label || "Não identificado";
    return {
      tipo: tipoLabel,
      animal: animalLabel,
      horaPicada: hora,
      tempoDecorrido: accidentStartTime ? formatElapsed(elapsedSeconds) : "Não informado",
      localPicada: localPicada || "Não informado",
      idade: idadeLabel,
      sinais: urgencyData?.sintomas || "Ver sintomas típicos",
      hospital: h.unidade,
      soroIndicado: specificType === "__COMPLETO__" ? "A definir pelo médico" : `Anti-${specificType.toLowerCase()}`,
      janela: urgencyData?.janela || "A avaliar"
    };
  };

  // ── Computar resultados ──
  React.useEffect(() => {
    if (step === 3 && userLocation && specificType) {
      let sorted;
      // ─── Ranking v3 ───
      // Inativos ficam visíveis mas no final. Tiebreakers: cobertura > internação > centro cirúrgico > distância.
      const ativosPrimeiro = (a, b) => (b.ativo ? 1 : 0) - (a.ativo ? 1 : 0);
      const internacaoTie = (a, b) => (b.tem_internacao ? 1 : 0) - (a.tem_internacao ? 1 : 0);
      const cirurgicoTie  = (a, b) => (b.tem_centro_cirurgico ? 1 : 0) - (a.tem_centro_cirurgico ? 1 : 0);

      if (specificType === "__COMPLETO__") {
        sorted = HOSPITALS

              <div key={i} style={{ width: step > i ? 32 : 8, height: 4, borderRadius: 2, background: step > i ? "#1351B4" : step === i ? "#FFCD07" : "#DEDEDE", transition: "all 0.3s ease" }}/>
            ))}
          </div>
        </div>

        {/* ═══ STEP 0: Animal ═══ */}
        {step === 0 && (
          <div style={{ animation: "fadeUp 0.4s ease-out" }}>
            <div style={{ background: "#FFFFFF", border: "1px solid #DEDEDE", borderRadius: 12, padding: 16, marginBottom: 20, textAlign: "center", boxShadow: "0 1px 3px rgba(0,0,0,0.04)" }}>
              <div style={{ fontSize: 14, color: "#0C326F", fontWeight: 700 }}>O que causou o acidente?</div>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              {ANIMAL_TYPES.map((animal, i) => (
                <button key={animal.id} className="animal-btn" onClick={() => { setAnimalType(animal.id); setStep(1); }} style={{
                  background: "#FFFFFF", border: "1.5px solid #DEDEDE",
                  borderRadius: 12, padding: "24px 12px", cursor: "pointer", color: "#1F1F1F", boxShadow: "0 1px 3px rgba(0,0,0,0.06)",
                  display: "flex", flexDirection: "column", alignItems: "center", gap: 8,
                  animation: `fadeUp ${0.3 + i*0.1}s ease-out`
                }}>
                  <span style={{ fontSize: 40 }}>{animal.icon}</span>
                  <span style={{ fontSize: 14, fontWeight: 600 }}>{animal.label}</span>
                </button>
              ))}
            </div>
            <button onClick={() => { goToResults("__COMPLETO__"); }} style={{
              width: "100%", marginTop: 16, padding: "14px",
              background: "#FFCD07", border: "none",
              borderRadius: 12, color: "#0C326F", fontWeight: 800, fontSize: 14,
              cursor: "pointer", letterSpacing: 0.5, textTransform: "uppercase", boxShadow: "0 2px 8px rgba(255,205,7,0.30)"
            }}>⚡ Não sei, buscar hospital mais completo</button>

            {/* GPS Status */}
            <div style={{ textAlign: "center", marginTop: 16, fontSize: 12, color: "#7A8394", display: "flex", alignItems: "center", justifyContent: "center", gap: 6 }}>
              <div style={{
                width: 8, height: 8, borderRadius: "50%",
                background: gpsStatus === "ok" ? "#22c55e" : gpsStatus === "fallback" ? "#f59e0b" : "#9BA4B5",
                animation: gpsStatus === "loading" ? "pulse-bar 1.5s ease-in-out infinite" : "none"
              }}/>
              {gpsStatus === "ok" && "📍 Localização obtida"}
              {gpsStatus === "loading" && "Obtendo localização..."}
              {gpsStatus === "fallback" && "GPS indisponível, usando Cascavel-PR"}
            </div>
          </div>
        )}

        {/* ═══ STEP 1: Subtype ═══ */}
        {step === 1 && selectedAnimalData && (
          <div style={{ animation: "fadeUp 0.3s ease-out" }}>
            <button onClick={() => { setStep(0); setAnimalType(null); }} style={{ background: "none", border: "none", color: "#1351B4", cursor: "pointer", fontSize: 13, fontWeight: 600, marginBottom: 16, padding: 0 }}>← Voltar</button>
            <div style={{ background: "#FFFFFF", borderRadius: 12, padding: 20, textAlign: "center", marginBottom: 20, border: "1px solid #DEDEDE", boxShadow: "0 1px 3px rgba(0,0,0,0.04)" }}>
              <span style={{ fontSize: 48 }}>{selectedAnimalData.icon}</span>
              <h2 style={{ fontSize: 18, marginTop: 8, marginBottom: 4 }}>{selectedAnimalData.label}</h2>
              <p style={{ fontSize: 13, color: "#636363" }}>Qual se parece mais com o animal?</p>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {selectedAnimalData.subtypes.map((sub, i) => (
                <button key={sub.id} className="card-hover" onClick={() => { goToResults(sub.id); }} style={{
                  background: "#FFFFFF", border: "1px solid #DEDEDE", borderRadius: 12, padding: "16px 18px",
                  cursor: "pointer", color: "#1F1F1F", textAlign: "left", boxShadow: "0 1px 3px rgba(0,0,0,0.04)", display: "flex",
                  alignItems: "center", gap: 14, animation: `fadeUp ${0.2 + i*0.1}s ease-out`
                }}>
                  <div style={{ width: 40, height: 40, borderRadius: 10, flexShrink: 0, background: `linear-gradient(135deg, ${sub.color}, ${sub.color}88)`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, fontWeight: 800, color: "#fff" }}>{sub.label[0]}</div>
                  <div>
                    <div style={{ fontWeight: 700, fontSize: 15 }}>{sub.label}</div>
                    <div style={{ fontSize: 12, color: "#636363", marginTop: 2 }}>{sub.desc}</div>
                  </div>
                </button>
              ))}
            </div>
          </div>
        )}

        {/* ═══ STEP 2: Location ═══ */}
        {step === 2 && (
          <div style={{ animation: "fadeUp 0.3s ease-out" }}>
            <button onClick={() => setStep(1)} style={{ background: "none", border: "none", color: "#1351B4", cursor: "pointer", fontSize: 13, fontWeight: 600, marginBottom: 16, padding: 0 }}>← Voltar</button>
            <div style={{ background: "rgba(255,255,255,0.06)", borderRadius: 20, padding: 32, textAlign: "center", border: "1px solid rgba(255,255,255,0.08)" }}>
              <div style={{ width: 72, height: 72, borderRadius: "50%", margin: "0 auto 20px", background: "rgba(220,38,38,0.10)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 32 }}>📍</div>
              <h2 style={{ fontSize: 20, marginBottom: 8 }}>Localização</h2>
              <p style={{ fontSize: 13, color: "#A8B0BF", marginBottom: 24, lineHeight: 1.5 }}>
                Precisamos da sua localização para encontrar o hospital mais próximo {specificType === "__COMPLETO__" ? <strong style={{ color: "#f59e0b" }}>com atendimento mais completo</strong> : <>com soro <strong style={{ color: "#f59e0b" }}>{specificType}</strong></>}
              </p>
              <button onClick={requestLocation} disabled={loadingGPS} style={{
                width: "100%", padding: "16px 24px",
                background: loadingGPS ? "#2D3548" : "linear-gradient(135deg, #dc2626, #b91c1c)",
                border: "none", borderRadius: 14, color: "#fff", fontWeight: 700,
                fontSize: 16, cursor: loadingGPS ? "default" : "pointer",
                boxShadow: loadingGPS ? "none" : "0 4px 24px rgba(220,38,38,0.4)"
              }}>
                {loadingGPS ? (
                  <span style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 10 }}>
                    <span style={{ width: 18, height: 18, border: "2px solid #fff4", borderTopColor: "#fff", borderRadius: "50%", display: "inline-block", animation: "spin 0.8s linear infinite" }}/>
                    Obtendo GPS...
                  </span>
                ) : "Compartilhar Localização"}
              </button>
            </div>
          </div>
        )}

        {/* ═══ STEP 3: Results ═══ */}
        {step === 3 && (
          <div style={{ animation: "fadeUp 0.3s ease-out" }}>
            <button onClick={() => { setStep(0); setAnimalType(null); setSpecificType(null); setResults([]); setLocationError(false); setTriage({ idade: null, tempo: null }); }} style={{ background: "none", border: "none", color: "#1351B4", cursor: "pointer", fontSize: 13, fontWeight: 600, marginBottom: 12, padding: 0 }}>← Nova busca</button>

            {locationError && (
              <div style={{ background: "rgba(245,158,11,0.1)", border: "1px solid rgba(245,158,11,0.2)", borderRadius: 10, padding: 12, marginBottom: 16, fontSize: 12, color: "#fbbf24" }}>
                GPS indisponível. Mostrando resultados a partir de Brasília-DF como referência. Em emergência, ligue SAMU 192.
              </div>
            )}

            <div style={{ background: "#FFFFFF", border: "1.5px solid #1351B4", borderRadius: 12, padding: 16, marginBottom: 16, textAlign: "center", boxShadow: "0 1px 3px rgba(0,0,0,0.04)" }}>
              <div style={{ fontSize: 12, color: "#636363", marginBottom: 4, fontWeight: 600 }}>{specificType === "__COMPLETO__" ? "Critério de busca" : "Soro necessário"}</div>
              <div style={{ fontSize: 18, fontWeight: 800, color: specificType === "__COMPLETO__" ? "#0C326F" : "#1351B4" }}>{specificType === "__COMPLETO__" ? "Atendimento Completo" : specificType}</div>
              <div style={{ fontSize: 11, color: "#888888", marginTop: 6 }}>{results.length} hospitais encontrados na região</div>
            </div>

            {/* ── CRONÔMETRO DE TEMPO DESDE A PICADA ── */}
            {accidentStartTime && specificType !== "__COMPLETO__" && (
              <div style={{
                background: timerColors[timerStatus].bg,
                border: `1.5px solid ${timerColors[timerStatus].border}`,
                borderRadius: 14, padding: "14px 18px", marginBottom: 16,
                display: "flex", alignItems: "center", justifyContent: "space-between",
                animation: timerStatus === "danger" ? "pulse-bar 1.5s ease-in-out infinite" : "fadeUp 0.3s ease-out"
              }}>
                <div>
                  <div style={{ fontSize: 11, color: timerColors[timerStatus].label, fontWeight: 600, textTransform: "uppercase", letterSpacing: 1, marginBottom: 2 }}>
                    ⏱ Tempo desde o acidente
                  </div>
                  <div style={{ fontSize: 11, color: "#636363", fontWeight: 500 }}>
                    Janela: {urgencyData?.janela || "N/D"}
                  </div>
                </div>
                <div style={{
                  fontSize: 26, fontWeight: 900, color: timerColors[timerStatus].text,
                  fontVariantNumeric: "tabular-nums", letterSpacing: 0.5
                }}>
                  {formatElapsed(elapsedSeconds)}
                </div>
              </div>
            )}

            {/* ── CARD DE URGÊNCIA CLÍNICA ── */}
            {urgencyData && showUrgency && (() => {
              const urgColors = {
                critica: { bg: "#FFF1F1", border: "#D04F4F", title: "#A03333", accent: "#D04F4F" },
                alta:    { bg: "#FFF8E8", border: "#FFCD07", title: "#8A6500", accent: "#B58A00" },
                moderada:{ bg: "#EBF3FF", border: "#1351B4", title: "#0C326F", accent: "#1351B4" }
              }[urgencyData.urgencia] || { bg: "#FFFFFF", border: "#DEDEDE", title: "#0C326F", accent: "#1351B4" };
              return (
              <div style={{
                background: urgColors.bg, border: `1.5px solid ${urgColors.border}`,
                borderRadius: 12, padding: 18, marginBottom: 16,
                animation: "fadeUp 0.3s ease-out", boxShadow: "0 1px 3px rgba(0,0,0,0.04)"
              }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ fontSize: 18 }}>{urgencyData.urgencia === "critica" ? "🔴" : urgencyData.urgencia === "alta" ? "🟠" : "🔵"}</span>
                    <span style={{ fontSize: 14, fontWeight: 800, color: urgColors.title, letterSpacing: 0.5 }}>
                      {urgencyData.urgencia === "critica" ? "URGÊNCIA CRÍTICA" : urgencyData.urgencia === "alta" ? "URGÊNCIA ALTA" : "URGÊNCIA MODERADA"}
                    </span>
                  </div>
                  <button onClick={() => setShowUrgency(false)} style={{ background: "none", border: "none", color: "#888", cursor: "pointer", fontSize: 18, padding: 4 }}>✕</button>
                </div>

                <div style={{ fontSize: 13, color: "#333333", lineHeight: 1.6 }}>
                  <div style={{ marginBottom: 12, padding: "10px 14px", background: "#FFFFFF", borderRadius: 8, border: `1px solid ${urgColors.border}66` }}>
                    <div style={{ fontSize: 11, fontWeight: 700, color: urgColors.accent, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 3 }}>⏱ Janela terapêutica</div>
                    <div style={{ color: "#1F1F1F", fontWeight: 600 }}>{urgencyData.janela}</div>
                  </div>
                  <div style={{ marginBottom: 10, padding: "0 2px" }}>
                    <strong style={{ color: "#0C326F" }}>Sintomas esperados: </strong>
                    <span style={{ color: "#333333" }}>{urgencyData.sintomas}</span>
                  </div>
                  <div style={{ marginBottom: 10, padding: "10px 12px", background: "#FFF1F1", borderRadius: 8, borderLeft: "3px solid #D04F4F" }}>
                    <strong style={{ color: "#A03333" }}>⚠ Crianças e idosos: </strong>
                    <span style={{ color: "#1F1F1F" }}>{urgencyData.riscoCrianca}</span>
                  </div>
                  <div style={{ marginBottom: 8, padding: "0 2px" }}>
                    <strong style={{ color: "#0C326F" }}>Local da picada: </strong>
                    <span style={{ color: "#333333" }}>{urgencyData.riscoLocal}</span>
                  </div>
                </div>

                <div style={{ marginTop: 14, padding: "12px 14px", background: "#FFFFFF", borderRadius: 10, border: "1px solid #DEDEDE" }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: "#1351B4", marginBottom: 5, textTransform: "uppercase", letterSpacing: 0.5 }}>📋 O que informar ao hospital</div>
                  <div style={{ fontSize: 13, color: "#333333", lineHeight: 1.6 }}>{urgencyData.oQueDizer}</div>
                </div>
              </div>
              );
            })()}

            {/* ── MINITRIAGEM RÁPIDA ── */}
            {urgencyData && (
              <div style={{ background: "#FFFFFF", border: "1px solid #DEDEDE", borderRadius: 12, padding: 16, marginBottom: 16, boxShadow: "0 1px 3px rgba(0,0,0,0.04)" }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: "#0C326F", marginBottom: 12 }}>🩺 Triagem rápida (informe ao hospital)</div>
                
                {/* Idade */}
                <div style={{ marginBottom: 12 }}>
                  <div style={{ fontSize: 12, color: "#636363", marginBottom: 8, fontWeight: 600 }}>Idade da vítima:</div>
                  <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                    {[
                      { id: "crianca", label: "Criança (< 12)", color: "#dc2626" },
                      { id: "adulto", label: "Adulto (12-60)", color: "#3b82f6" },
                      { id: "idoso", label: "Idoso (> 60)", color: "#f59e0b" },
                    ].map(opt => (
                      <button key={opt.id} className="triage-btn" onClick={() => setTriage(t => ({ ...t, idade: opt.id }))} style={{
                        padding: "8px 14px", borderRadius: 8, fontSize: 12, fontWeight: 600,
                        background: triage.idade === opt.id ? `${opt.color}25` : "rgba(255,255,255,0.04)",
                        border: `1.5px solid ${triage.idade === opt.id ? opt.color : "rgba(255,255,255,0.08)"}`,
                        color: triage.idade === opt.id ? opt.color : "#9BA4B5"
                      }}>{opt.label}</button>
                    ))}
                  </div>
                </div>

                {/* Tempo desde o acidente */}
                <div>
                  <div style={{ fontSize: 12, color: "#636363", marginBottom: 8, fontWeight: 600 }}>Tempo desde o acidente:</div>
                  <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                    {[
                      { id: "menos1h", label: "< 1 hora" },
                      { id: "1a3h", label: "1 a 3 horas" },
                      { id: "3a6h", label: "3 a 6 horas" },
                      { id: "mais6h", label: "> 6 horas" },
                    ].map(opt => (
                      <button key={opt.id} className="triage-btn" onClick={() => setTriage(t => ({ ...t, tempo: opt.id }))} style={{
                        padding: "8px 12px", borderRadius: 8, fontSize: 12, fontWeight: 600,
                        background: triage.tempo === opt.id ? "rgba(245,158,11,0.15)" : "rgba(255,255,255,0.04)",
                        border: `1.5px solid ${triage.tempo === opt.id ? "#f59e0b" : "rgba(255,255,255,0.08)"}`,
                        color: triage.tempo === opt.id ? "#fbbf24" : "#9BA4B5"
                      }}>{opt.label}</button>
                    ))}
                  </div>
                </div>

                {/* Resultado da triagem */}
                {(triage.idade || triage.tempo) && (
                  <div style={{
                    marginTop: 12, padding: "10px 14px", borderRadius: 10,
                    background: severityLevel === "critico" || severityLevel === "grave"
                      ? "rgba(220,38,38,0.12)" : "rgba(245,158,11,0.10)",
                    border: `1px solid ${severityLevel === "critico" || severityLevel === "grave" ? "rgba(220,38,38,0.3)" : "rgba(245,158,11,0.25)"}`,
                    animation: "fadeUp 0.2s ease-out"
                  }}>
                    <div style={{ fontSize: 12, fontWeight: 700, color: severityLevel === "critico" || severityLevel === "grave" ? "#fca5a5" : "#fbbf24" }}>
                      {severityLevel === "critico" ? "⚠ SITUAÇÃO CRÍTICA: Desloque-se imediatamente" :
                       severityLevel === "grave" ? "⚠ RISCO ELEVADO: Priorize rapidez no atendimento" :
                       "ℹ Atendimento recomendado com agilidade"}
                    </div>
                    {triage.idade === "crianca" && (
                      <div style={{ fontSize: 11, color: "#fca5a5", marginTop: 4 }}>
                        Crianças têm maior risco de complicações graves. Informe o peso da criança ao hospital.
                      </div>
                    )}
                  </div>
                )}
              </div>
            )}

            {/* Alerta SAMU */}
            <div style={{
              background: "linear-gradient(135deg, rgba(220,38,38,0.15), rgba(185,28,28,0.08))",
              border: "1px solid rgba(220,38,38,0.3)", borderRadius: 14, padding: 16,
              marginBottom: 20, display: "flex", alignItems: "center", gap: 14
            }}>
              <div style={{ fontSize: 28, animation: "shake 1s ease-in-out infinite" }}>🚑</div>
              <div>
                <div style={{ fontWeight: 700, fontSize: 14, color: "#fca5a5" }}>Ligue SAMU: 192</div>
                <div style={{ fontSize: 12, color: "#A8B0BF", marginTop: 2 }}>Confirme estoque de soro antes de se deslocar</div>
              </div>
              <a href="tel:192" style={{ marginLeft: "auto", background: "#dc2626", color: "#fff", borderRadius: 10, padding: "10px 16px", fontWeight: 700, fontSize: 13, textDecoration: "none", flexShrink: 0 }}>Ligar</a>
            </div>

            {/* Hospital list */}
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {results.map((h, i) => {
                // Diferenciação visual de hospitais inativos
                const isInativo = !h.ativo;
                const cardBorder = isInativo
                  ? "1.5px dashed #B0B8C8"
                  : (i === 0 ? "2px solid #1351B4" : "1px solid #DEDEDE");
                const cardShadow = isInativo
                  ? "none"
                  : (i === 0 ? "0 4px 12px rgba(19,81,180,0.15)" : "0 1px 3px rgba(0,0,0,0.06)");
                const cardBg = isInativo ? "#FAFBFC" : "#FFFFFF";
                const cardOpacity = isInativo ? 0.78 : 1;

                // Status do destaque "Mais próximo" — só aparece em ativos
                const showTopBadge = i === 0 && !isInativo;

                // Indicador de qualidade do geocoding (centróide = aviso)
                const geoIsApprox = h.geocoding_quality === "municipio_uf" ||
                                    h.geocoding_quality === "municipio_uf_manual" ||
                                    h.geocoding_quality === "fallback_capital";

                return (
                <div key={i} className="card-hover" style={{
                  background: cardBg, border: cardBorder, boxShadow: cardShadow,
                  borderRadius: 16, padding: 0, overflow: "hidden", opacity: cardOpacity,
                  animation: `fadeUp ${0.2 + i*0.06}s ease-out`, cursor: "pointer"
                }} onClick={() => setExpanded(expanded === i ? null : i)}>
                  <div style={{ padding: "16px 18px" }}>
                    {/* Linha de status (badges de cima): destaque OU desativado */}
                    {(showTopBadge || isInativo) && (
                      <div style={{ display: "flex", flexWrap: "wrap", gap: 5, marginBottom: 8 }}>
                        {showTopBadge && (
                          <span style={{
                            fontSize: 10, fontWeight: 800,
                            background: specificType === "__COMPLETO__" ? "#FFCD07" : "#1351B4",
                            color: specificType === "__COMPLETO__" ? "#0C326F" : "#fff",
                            padding: "3px 10px", borderRadius: 4,
                            letterSpacing: 1, textTransform: "uppercase"
                          }}>{specificType === "__COMPLETO__" ? "Mais completo" : "Mais próximo"}</span>
                        )}
                        {isInativo && (
                          <span style={{
                            fontSize: 10, fontWeight: 800, color: "#636363",
                            background: "#E5E7EB", padding: "3px 10px", borderRadius: 4,
                            letterSpacing: 0.5, textTransform: "uppercase",
                            display: "inline-flex", alignItems: "center", gap: 4
                          }}>⚠ Desativado no CNES</span>
                        )}
                      </div>
                    )}

                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontWeight: 700, fontSize: 15, lineHeight: 1.3, color: isInativo ? "#636363" : "#1F1F1F", textDecoration: isInativo ? "line-through" : "none" }}>{h.unidade}</div>
                        <div style={{ fontSize: 12, color: "#636363", marginTop: 4 }}>
                          {h.municipio} - {h.estado}
                          {specificType === "__COMPLETO__" && h.cobertura && (
                            <span style={{ marginLeft: 8, color: "#f59e0b", fontWeight: 600 }}>{h.cobertura} soros</span>
                          )}
                        </div>

                        {/* Badges Tier 1: 24h, internação, centro cirúrgico, tipo de unidade */}
                        <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginTop: 8 }}>
                          {h.turno_atendimento === "24h" && (
                            <span title="Atendimento 24 horas" style={{
                              fontSize: 10, fontWeight: 700, padding: "2px 7px", borderRadius: 4,
                              background: "rgba(22,136,33,0.10)", color: "#168821",
                              border: "1px solid rgba(22,136,33,0.25)"
                            }}>🕐 24h</span>
                          )}
                          {h.turno_atendimento && h.turno_atendimento !== "24h" && (
                            <span title={`Turno: ${h.turno_atendimento_completo || h.turno_atendimento}`} style={{
                              fontSize: 10, fontWeight: 700, padding: "2px 7px", borderRadius: 4,
                              background: "rgba(245,158,11,0.10)", color: "#A66800",
                              border: "1px solid rgba(245,158,11,0.30)"
                            }}>⚠ {h.turno_atendimento}</span>
                          )}
                          {h.tem_internacao === true && (
                            <span title="Possui leitos para internação" style={{
                              fontSize: 10, fontWeight: 700, padding: "2px 7px", borderRadius: 4,
                              background: "rgba(19,81,180,0.08)", color: "#1351B4",
                              border: "1px solid rgba(19,81,180,0.20)"
                            }}>🛏 Internação</span>
                          )}
                          {h.tem_centro_cirurgico === true && (
                            <span title="Possui centro cirúrgico" style={{
                              fontSize: 10, fontWeight: 700, padding: "2px 7px", borderRadius: 4,
                              background: "rgba(19,81,180,0.08)", color: "#1351B4",
                              border: "1px solid rgba(19,81,180,0.20)"
                            }}>🏥 Cirurgia</span>
                          )}
                          {h.tipo_unidade && (
                            <span title={`Tipo CNES: ${h.tipo_unidade}`} style={{
                              fontSize: 10, fontWeight: 600, padding: "2px 7px", borderRadius: 4,
                              background: "#F3F4F6", color: "#636363",
                              border: "1px solid #E5E7EB"
                            }}>{h.tipo_unidade.length > 22 ? h.tipo_unidade.slice(0,20)+"…" : h.tipo_unidade}</span>
                          )}
                        </div>

  <!-- Service Worker Registration -->
  <script>
    // O install prompt e o status offline são gerenciados pelos hooks usePWAInstall
    // e useOfflineStatus dentro do componente React. Aqui só registramos o SW.
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => {
            console.log('[Mais Soro] SW registrado:', reg.scope);
            // Quando o SW estiver ativo, dispara cacheamento dos dados em background
            // para que fique disponível offline assim que possível.
            if (reg.active) {
              reg.active.postMessage({ type: 'CACHE_DATA' });
            } else if (reg.installing || reg.waiting) {
              const sw = reg.installing || reg.waiting;
              sw.addEventListener('statechange', () => {
                if (sw.state === 'activated') {
                  sw.postMessage({ type: 'CACHE_DATA' });
                }
              });
            }
          })
          .catch(err => console.warn('[Mais Soro] SW falhou:', err));
      });
    }
  </script>
