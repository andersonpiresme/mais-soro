function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

  // ── AUTO-GPS no carregamento ──
  React.useEffect(() => {
    const useFallback = (reason) => {
      console.warn("GPS fallback:", reason);
      setUserLocation({ lat: -24.9573, lng: -53.4550 });
      setGpsStatus("fallback");
      setLocationError(true);
    };

    // Verifica se estamos em contexto seguro (HTTPS ou localhost)
    const isSecure = window.isSecureContext || window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1";
    if (!isSecure) {
      useFallback("Contexto não seguro, GPS requer HTTPS");
      return;
    }

    if (!navigator.geolocation) {
      useFallback("Geolocation API indisponível");
      return;
    }

    // Tenta obter localização com alta precisão primeiro, depois baixa precisão
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        setUserLocation({ lat: pos.coords.latitude, lng: pos.coords.longitude });
        setGpsStatus("ok");
      },
      (err) => {
        // Tenta novamente com baixa precisão (usa torre celular/wifi ao invés de GPS)
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            setUserLocation({ lat: pos.coords.latitude, lng: pos.coords.longitude });
            setGpsStatus("ok");
          },
          (err2) => useFallback(`Erro código ${err2.code}: ${err2.message}`),
          { enableHighAccuracy: false, timeout: 15000, maximumAge: 300000 }
        );
      },
      { enableHighAccuracy: true, timeout: 8000, maximumAge: 60000 }
    );
  }, []);

  // ── CRONÔMETRO: calcular tempo estimado do acidente baseado na triagem ──
  React.useEffect(() => {
    if (!triage.tempo) { setAccidentStartTime(null); return; }
    const offsetMinutes = {
      "menos1h": 30,
      "1a3h": 120,
      "3a6h": 270,
      "mais6h": 420
    }[triage.tempo] || 0;
    const startTime = Date.now() - (offsetMinutes * 60 * 1000);
    setAccidentStartTime(startTime);
  }, [triage.tempo]);

  // ── CRONÔMETRO: atualizar a cada segundo ──
  React.useEffect(() => {
    if (!accidentStartTime) return;
    const updateElapsed = () => {
      const elapsed = Math.floor((Date.now() - accidentStartTime) / 1000);

    };

    const interval = setInterval(updateElapsed, 1000);

    const m = Math.floor((seconds % 3600) / 60);
    const s = seconds % 60;
    if (h > 0) return `${h}h ${String(m).padStart(2, '0')}min`;

    "Lonômico": 720, "Aracnídico": 360
  }[type] || 360);

  // Status do cronômetro (cor baseada em proximidade da janela terapêutica)

    if (!specificType || specificType === "__COMPLETO__") return "safe";
    const windowMin = getWindowMinutes(specificType);
    const elapsedMin = elapsedSeconds / 60;
    const pct = elapsedMin / windowMin;
    if (pct < 0.5) return "safe";
    if (pct < 0.8) return "warning";
    return "danger";
  };

  const timerColors = {
    safe: { bg: "#FFFFFF", border: "#168821", text: "#168821", label: "#168821" },
    warning: { bg: "#FFFBEA", border: "#FFCD07", text: "#B58A00", label: "#8A6500" },
    danger: { bg: "#FFF1F1", border: "#D04F4F", text: "#D04F4F", label: "#A03333" }
  };

  // Gerar ficha de transferência
  const generateFicha = (h) => {
    const idadeLabel = { crianca: "Criança (< 12 anos)", adulto: "Adulto (12-60 anos)", idoso: "Idoso (> 60 anos)" }[triage.idade] || "Não informado";

    const tipoLabel = specificType === "__COMPLETO__" ? "Não identificado" : specificType;
    const animalLabel = selectedAnimalData?.label || "Não identificado";

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('SW registrado:', reg.scope))
          .catch(err => console.log('SW falhou:', err));
      });
    }

    // PWA Install prompt
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      const banner = document.getElementById('install-banner');
      if (banner) banner.style.display = 'flex';
    });
    function installApp() {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(() => {
          deferredPrompt = null;
          const banner = document.getElementById('install-banner');
          if (banner) banner.style.display = 'none';
        });
      }
    }
    function dismissInstall() {
      const banner = document.getElementById('install-banner');
      if (banner) banner.style.display = 'none';
    }
  </script>

  <!-- Install Banner -->
  <div id="install-banner" style="
    display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
    background: rgba(23,28,40,0.96); backdrop-filter: blur(12px);
    border-top: 1px solid rgba(255,255,255,0.08);
    padding: 16px 20px; align-items: center; gap: 12; justify-content: center;
    animation: fadeUp 0.4s ease-out;
  ">
    <div style="flex:1; min-width:0;">
      <div style="font-size:14px; font-weight:700; color:#fff; font-family:'Segoe UI',sans-serif;">Instalar Socorro Peçonhentos</div>
      <div style="font-size:12px; color:#9BA4B5; margin-top:2px; font-family:'Segoe UI',sans-serif;">Funciona offline, acesso rápido na emergência</div>
    </div>
    <button onclick="installApp()" style="
      background: linear-gradient(135deg,#dc2626,#b91c1c); border:none; color:#fff;
      padding: 10px 20px; border-radius:10px; font-weight:700; font-size:13px;
      cursor:pointer; white-space:nowrap; font-family:'Segoe UI',sans-serif;
    ">Instalar</button>
    <button onclick="dismissInstall()" style="
      background:none; border:none; color:#666; font-size:18px; cursor:pointer; padding:4px 8px;
    ">✕</button>
  </div>
